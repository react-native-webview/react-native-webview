name: Windows CI
on: [pull_request]

jobs:
  run-windows-tests:
    name: Build & run tests
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6
        name: Checkout Code

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1.3
        with:
          vs-version: '[17.0,)'
          msbuild-architecture: x64

      - name: Install workspace dependencies
        run: bun install

      - name: Install Windows example dependencies
        run: bun install
        working-directory: packages/example-windows

      - name: Build JS
        run: |
          bun run build
          bun run tsc

      - name: Setup Windows project
        shell: cmd
        run: |
          cd packages\example-windows
          echo ::notice::RNTA_VER=
          node -e "console.log(require('react-native-test-app/package.json').version)"
          echo ::notice::RNW_VER=
          node -e "console.log(require('react-native-windows/package.json').version)"
          node node_modules\react-native-test-app\windows\app.mjs --project-directory windows > rnta_output.txt 2>&1
          set RNTA_EXIT=%errorlevel%
          echo Exit code: %RNTA_EXIT%
          type rnta_output.txt
          if %RNTA_EXIT% neq 0 (
            for /f "usebackq delims=" %%i in (`type rnta_output.txt`) do set LAST_LINE=%%i
            echo ::error::RNTA_OUTPUT: %LAST_LINE%
            exit /b %RNTA_EXIT%
          )

      - name: Build x64 release
        shell: powershell
        run: |
          cd packages\example-windows
          npx react-native run-windows --arch x64 --release --no-packager --no-deploy --logging

      - name: Deploy
        shell: powershell
        run: |
          Copy-Item -Path packages\example-windows\windows\x64\Release -Recurse -Destination packages\example-windows\windows\
          cd packages\example-windows
          npx react-native run-windows --arch x64 --release --logging --no-build --no-packager --deploy-from-layout

      - name: Start Appium server
        shell: powershell
        run: Start-Process PowerShell -ArgumentList "bun run --bun appium"

      - name: Start React server
        shell: powershell
        run: |
          cd packages/example-windows
          Start-Process PowerShell -ArgumentList "bun run start"

      - name: Run tests
        run: bun run test:windows
