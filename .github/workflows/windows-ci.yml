name: Windows CI
on: [pull_request]

jobs:
  run-windows-tests:
    name: Build & run tests
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6
        name: Checkout Code

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1.3
        with:
          vs-version: '[17.0,)'
          msbuild-architecture: x64

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Install Windows example dependencies
        run: bun install --frozen-lockfile
        working-directory: packages/example-windows

      - name: Build JS
        run: |
          bun run build
          bun run tsc

      # TEMPORARY: Generate Windows project files and commit them.
      # Remove this block once the files are committed to the repo.
      - name: Generate Windows project
        shell: powershell
        run: |
          cd packages\example-windows
          if (-not (Test-Path "windows\*.sln")) {
            Copy-Item metro.config.js metro.config.js.bak
            Copy-Item index.js index.js.bak
            npx react-native init-windows --overwrite --logging
            Copy-Item metro.config.js.bak metro.config.js -Force
            Copy-Item index.js.bak index.js -Force
          }

      - name: Commit generated files
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/example-windows/windows/ packages/example-windows/react-native.config.js
          git diff --cached --quiet || (git commit -m "chore: commit Windows project files [skip ci]" && git push origin HEAD:${{ github.head_ref }})

      - name: Build x64 release
        shell: powershell
        run: |
          cd packages\example-windows
          npx react-native run-windows --arch x64 --release --no-packager --no-deploy --logging
