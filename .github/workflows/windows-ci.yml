name: Windows CI
on: [pull_request]

jobs:
  run-windows-tests:
    name: Build & run tests
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6
        name: Checkout Code

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1.3
        with:
          vs-version: '[17.0,)'
          msbuild-architecture: x64

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Install Windows example dependencies
        env:
          # Tests use WinAppDriver, not chromedriver. The chromedriver
          # postinstall hits a deprecated Google XML endpoint and fails.
          APPIUM_SKIP_CHROMEDRIVER_INSTALL: 'true'
        run: bun install --frozen-lockfile
        working-directory: packages/example-windows

      - name: Build JS
        run: |
          bun run build
          bun run tsc

      - name: Generate Windows test app project
        working-directory: packages/example-windows
        run: bunx install-windows-test-app --use-fabric --project-directory windows

      - name: Patch autolink and solution
        shell: bash
        working-directory: packages/example-windows
        run: |
          # RNTA's autolink is fire-and-forget (unwaited Promise) and may not
          # complete. Write the correct autolink file and add the webview
          # project to the solution deterministically.

          GEN_DIR=$(find node_modules/.generated/windows -name "AutolinkedNativeModules.g.cpp" -print -quit 2>/dev/null)
          if [ -z "$GEN_DIR" ]; then echo "::error::Generated AutolinkedNativeModules.g.cpp not found"; exit 1; fi
          GEN_PROJECT_DIR=$(dirname "$GEN_DIR")

          # 1. Write AutolinkedNativeModules.g.cpp with webview registration
          cat > "$GEN_DIR" << 'AUTOLINK_EOF'
          // AutolinkedNativeModules.g.cpp contents generated by "react-native autolink-windows"
          // clang-format off
          #include "pch.h"
          #include "AutolinkedNativeModules.g.h"

          // Includes from react-native-webview
          #include <winrt/ReactNativeWebView.h>

          namespace winrt::Microsoft::ReactNative
          {

          void RegisterAutolinkedNativeModulePackages(winrt::Windows::Foundation::Collections::IVector<winrt::Microsoft::ReactNative::IReactPackageProvider> const& packageProviders)
          {
              // IReactPackageProviders from react-native-webview
              packageProviders.Append(winrt::ReactNativeWebView::ReactPackageProvider());
          }

          }
          AUTOLINK_EOF
          echo "Wrote AutolinkedNativeModules.g.cpp"
          cat "$GEN_DIR"

          # 2. Add webview project reference to the RNTA vcxproj
          VCXPROJ=$(find node_modules/.generated/windows -name "*.vcxproj" -print -quit)
          WEBVIEW_PROJ="node_modules/react-native-webview/windows/ReactNativeWebView/ReactNativeWebView.vcxproj"
          REL_PATH=$(python3 -c "import os; print(os.path.relpath('$WEBVIEW_PROJ', '$(dirname $VCXPROJ)'))")

          if ! grep -q "ReactNativeWebView" "$VCXPROJ"; then
            # Use Windows-style backslashes in the path
            REL_PATH_WIN=$(echo "$REL_PATH" | sed 's|/|\\|g')
            sed -i 's|</Project>|  <ItemGroup>\n    <ProjectReference Include="$(ProjectDir)'"$REL_PATH_WIN"'">\n      <Project>{30CADFC7-80EF-4296-A405-47E4B97C0C71}</Project>\n    </ProjectReference>\n  </ItemGroup>\n</Project>|' "$VCXPROJ"
            echo "Added ReactNativeWebView project reference to $(basename $VCXPROJ)"
          fi

          # 3. Add webview project to the solution
          SLN="windows/WebviewExample.sln"
          WEBVIEW_SLN_PATH=$(python3 -c "import os; print(os.path.relpath('$WEBVIEW_PROJ', 'windows'))")
          WEBVIEW_SLN_PATH_WIN=$(echo "$WEBVIEW_SLN_PATH" | sed 's|/|\\|g')

          if ! grep -q "ReactNativeWebView" "$SLN"; then
            # Insert project entry before the last "EndProject\nGlobal" and add build configs
            python3 << PYEOF
          import re

          with open("$SLN", "r") as f:
              content = f.read()

          proj_entry = '''Project("{8BC9CEB8-8B4A-11D0-8D11-00A0C91BC942}") = "ReactNativeWebView", "$WEBVIEW_SLN_PATH_WIN", "{30CADFC7-80EF-4296-A405-47E4B97C0C71}"
          \tProjectSection(ProjectDependencies) = postProject
          \t\t{B44CEAD7-FBFF-4A17-95EA-FF5434BBD79D} = {B44CEAD7-FBFF-4A17-95EA-FF5434BBD79D}
          \tEndProjectSection
          EndProject
          '''

          configs = '''\t\t{30CADFC7-80EF-4296-A405-47E4B97C0C71}.Debug|x64.ActiveCfg = Debug|x64
          \t\t{30CADFC7-80EF-4296-A405-47E4B97C0C71}.Debug|x64.Build.0 = Debug|x64
          \t\t{30CADFC7-80EF-4296-A405-47E4B97C0C71}.Release|x64.ActiveCfg = Release|x64
          \t\t{30CADFC7-80EF-4296-A405-47E4B97C0C71}.Release|x64.Build.0 = Release|x64
          '''

          # Add project before Global
          content = content.replace('Global\n', proj_entry + 'Global\n', 1)

          # Add build config inside GlobalSection(ProjectConfigurationPlatforms)
          content = content.replace(
              'EndGlobalSection\n\tGlobalSection(SolutionProperties)',
              configs + '\tEndGlobalSection\n\tGlobalSection(SolutionProperties)'
          )

          with open("$SLN", "w") as f:
              f.write(content)

          print("Added ReactNativeWebView to solution")
          PYEOF
          fi

          echo "=== Solution projects ==="
          grep "^Project" "$SLN" || true

      - name: Build x64 release
        shell: powershell
        working-directory: packages/example-windows
        run: |
          msbuild windows\WebviewExample.sln /p:Configuration=Release /p:Platform=x64 /p:AppxBundle=Never /restore /bl:build.binlog 2>&1 | Tee-Object -FilePath build.log
          $code = $LASTEXITCODE
          if ($code -ne 0) {
            Write-Host "::group::Build errors"
            Get-Content build.log | Select-String ": error |: fatal error|LNK[0-9]" | Select-Object -Last 60 | ForEach-Object { Write-Host "::error::$_" }
            Write-Host "::endgroup::"
            exit $code
          }

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-logs
          path: |
            packages/example-windows/build.log
            packages/example-windows/build.binlog

      - name: Deploy
        shell: powershell
        working-directory: packages/example-windows
        run: |
          Copy-Item -Path windows\x64\Release -Recurse -Destination windows\
          bunx react-native run-windows --arch x64 --release --logging --no-build --no-packager --deploy-from-layout

      - name: Start Appium server
        shell: powershell
        working-directory: packages/example-windows
        run: Start-Process PowerShell -ArgumentList "bun run --bun appium"

      - name: Start React server
        shell: powershell
        working-directory: packages/example-windows
        run: Start-Process PowerShell -ArgumentList "bun run start"

      - name: Run tests
        working-directory: packages/example-windows
        run: bun run test
