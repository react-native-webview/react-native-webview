name: Windows CI
on: [pull_request]

jobs:
  run-windows-tests:
    name: Build & run tests
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6
        name: Checkout Code

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1.3
        with:
          vs-version: '[17.0,)'
          msbuild-architecture: x64

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Install Windows example dependencies
        run: bun install --frozen-lockfile
        working-directory: packages/example-windows

      - name: Build JS
        run: |
          bun run build
          bun run tsc

      # TEMPORARY: Generate and commit Windows project + autolink files.
      # After this runs once, remove everything between the --- markers
      # and keep only the "Build x64 release" step.
      # ---
      - name: Generate Windows project
        shell: powershell
        run: |
          cd packages\example-windows
          Copy-Item metro.config.js metro.config.js.bak
          Copy-Item index.js index.js.bak
          npx react-native init-windows --overwrite --logging
          Copy-Item metro.config.js.bak metro.config.js -Force
          Copy-Item index.js.bak index.js -Force
          $sln = Get-ChildItem -Path windows -Filter "*.sln" -Recurse | Select-Object -First 1
          $proj = Get-ChildItem -Path windows -Filter "*.vcxproj" -Recurse | Select-Object -First 1
          npx @react-native-community/cli autolink-windows --sln $sln.FullName --proj $proj.FullName

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/example-windows/windows/
          git diff --cached --quiet || (git commit -m "chore: commit Windows project and autolink files [skip ci]" && git push origin HEAD:${{ github.head_ref }})
      # ---

      - name: Build x64 release
        shell: powershell
        run: |
          cd packages\example-windows
          $sln = Get-ChildItem -Path windows -Filter "*.sln" -Recurse | Select-Object -First 1
          msbuild $sln.FullName /p:Configuration=Release /p:Platform=x64 /p:Bundle=false /p:AppxBundle=Never /restore
