name: Windows CI
on: [pull_request]

jobs:
  run-windows-tests:
    name: Build & run tests
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6
        name: Checkout Code

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1.3
        with:
          vs-version: '[17.0,)'
          msbuild-architecture: x64

      - name: Install workspace dependencies
        run: bun install

      - name: Install Windows example dependencies
        run: bun install
        working-directory: packages/example-windows

      - name: Build JS
        run: |
          bun run build
          bun run tsc

      - name: Init Windows
        shell: powershell
        run: |
          cd packages\example-windows
          npx react-native init-windows --overwrite --logging

      - name: Build x64 release
        shell: powershell
        run: |
          cd packages\example-windows
          npx react-native run-windows --arch x64 --release --no-packager --no-deploy --logging
