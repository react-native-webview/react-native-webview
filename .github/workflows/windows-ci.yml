name: Windows CI
on: [pull_request]

jobs:
  run-windows-tests:
    name: Build & run tests
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6
        name: Checkout Code

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1.3
        with:
          vs-version: '[17.0,)'
          msbuild-architecture: x64

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Install Windows example dependencies
        env:
          # Tests use WinAppDriver, not chromedriver. The chromedriver
          # postinstall hits a deprecated Google XML endpoint and fails.
          APPIUM_SKIP_CHROMEDRIVER_INSTALL: 'true'
        run: bun install --frozen-lockfile
        working-directory: packages/example-windows

      - name: Build JS
        run: |
          bun run build
          bun run tsc

      - name: Generate Windows test app project
        working-directory: packages/example-windows
        run: bunx install-windows-test-app --use-fabric --project-directory windows

      - name: Patch autolink and solution
        shell: powershell
        working-directory: packages/example-windows
        run: |
          # RNTA's autolink is fire-and-forget (unwaited Promise) and may not
          # complete. Write the correct autolink file and add the webview
          # project to the solution deterministically.

          # 1. Write AutolinkedNativeModules.g.cpp with webview registration
          $genCpp = Get-ChildItem -Path node_modules\.generated\windows -Filter "AutolinkedNativeModules.g.cpp" -Recurse | Select-Object -First 1
          if (-not $genCpp) { Write-Host "::error::Generated project dir not found"; exit 1 }
          $autolinkContent = @"
          // AutolinkedNativeModules.g.cpp contents generated by "react-native autolink-windows"
          // clang-format off
          #include "pch.h"
          #include "AutolinkedNativeModules.g.h"

          // Includes from react-native-webview
          #include <winrt/ReactNativeWebView.h>

          namespace winrt::Microsoft::ReactNative
          {

          void RegisterAutolinkedNativeModulePackages(winrt::Windows::Foundation::Collections::IVector<winrt::Microsoft::ReactNative::IReactPackageProvider> const& packageProviders)
          {
              // IReactPackageProviders from react-native-webview
              packageProviders.Append(winrt::ReactNativeWebView::ReactPackageProvider());
          }

          }
          "@
          Set-Content -Path $genCpp.FullName -Value $autolinkContent -Encoding UTF8
          Write-Host "Wrote AutolinkedNativeModules.g.cpp"

          # 2. Add webview project reference to the RNTA vcxproj
          $vcxproj = Get-ChildItem -Path node_modules\.generated\windows -Filter "*.vcxproj" -Recurse | Select-Object -First 1
          $webviewProjPath = Resolve-Path "node_modules\react-native-webview\windows\ReactNativeWebView\ReactNativeWebView.vcxproj"
          $relPath = [System.IO.Path]::GetRelativePath((Split-Path $vcxproj.FullName), $webviewProjPath)
          $projRef = @"

            <ItemGroup>
              <ProjectReference Include="`$(ProjectDir)$relPath">
                <Project>{30CADFC7-80EF-4296-A405-47E4B97C0C71}</Project>
              </ProjectReference>
            </ItemGroup>
          "@
          $content = Get-Content $vcxproj.FullName -Raw
          if ($content -notmatch 'ReactNativeWebView') {
            $content = $content -replace '</Project>', "$projRef`n</Project>"
            Set-Content -Path $vcxproj.FullName -Value $content -Encoding UTF8
            Write-Host "Added ReactNativeWebView project reference to $($vcxproj.Name)"
          }

          # 3. Add webview project to the solution
          $sln = "windows\WebviewExample.sln"
          $slnContent = Get-Content $sln -Raw
          if ($slnContent -notmatch 'ReactNativeWebView') {
            $webviewSlnEntry = @"
          Project("{8BC9CEB8-8B4A-11D0-8D11-00A0C91BC942}") = "ReactNativeWebView", "$(Resolve-Path $webviewProjPath | % { [System.IO.Path]::GetRelativePath((Resolve-Path windows), $_) })", "{30CADFC7-80EF-4296-A405-47E4B97C0C71}"
          	ProjectSection(ProjectDependencies) = postProject
          		{B44CEAD7-FBFF-4A17-95EA-FF5434BBD79D} = {B44CEAD7-FBFF-4A17-95EA-FF5434BBD79D}
          	EndProjectSection
          EndProject
          "@
            $slnContent = $slnContent -replace '(EndProject\r?\nGlobal)', "$webviewSlnEntry`n`$1"
            $slnContent += @"

          	GlobalSection(ProjectConfigurationPlatforms) = postSolution
          		{30CADFC7-80EF-4296-A405-47E4B97C0C71}.Debug|x64.ActiveCfg = Debug|x64
          		{30CADFC7-80EF-4296-A405-47E4B97C0C71}.Debug|x64.Build.0 = Debug|x64
          		{30CADFC7-80EF-4296-A405-47E4B97C0C71}.Release|x64.ActiveCfg = Release|x64
          		{30CADFC7-80EF-4296-A405-47E4B97C0C71}.Release|x64.Build.0 = Release|x64
          	EndGlobalSection
          "@
            Set-Content -Path $sln -Value $slnContent -Encoding UTF8
            Write-Host "Added ReactNativeWebView to solution"
          }

          # 4. Show result
          Write-Host "=== AutolinkedNativeModules.g.cpp ==="
          Get-Content $genCpp.FullName
          Write-Host "=== Solution projects ==="
          Select-String -Path $sln -Pattern "Project\(" | ForEach-Object { Write-Host $_.Line }

      - name: Build x64 release
        shell: powershell
        working-directory: packages/example-windows
        run: |
          msbuild windows\WebviewExample.sln /p:Configuration=Release /p:Platform=x64 /p:AppxBundle=Never /restore /bl:build.binlog 2>&1 | Tee-Object -FilePath build.log
          $code = $LASTEXITCODE
          if ($code -ne 0) {
            Write-Host "::group::Build errors"
            Get-Content build.log | Select-String ": error |: fatal error|LNK[0-9]" | Select-Object -Last 60 | ForEach-Object { Write-Host "::error::$_" }
            Write-Host "::endgroup::"
            exit $code
          }

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-logs
          path: |
            packages/example-windows/build.log
            packages/example-windows/build.binlog

      - name: Deploy
        shell: powershell
        working-directory: packages/example-windows
        run: |
          Copy-Item -Path windows\x64\Release -Recurse -Destination windows\
          bunx react-native run-windows --arch x64 --release --logging --no-build --no-packager --deploy-from-layout

      - name: Start Appium server
        shell: powershell
        working-directory: packages/example-windows
        run: Start-Process PowerShell -ArgumentList "bun run --bun appium"

      - name: Start React server
        shell: powershell
        working-directory: packages/example-windows
        run: Start-Process PowerShell -ArgumentList "bun run start"

      - name: Run tests
        working-directory: packages/example-windows
        run: bun run test
