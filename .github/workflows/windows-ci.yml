name: Windows CI
on: [pull_request]

jobs:
  run-windows-tests:
    name: Build & run tests
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6
        name: Checkout Code

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1.3
        with:
          vs-version: '[17.0,)'
          msbuild-architecture: x64

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Install Windows example dependencies
        run: bun install --frozen-lockfile
        working-directory: packages/example-windows

      - name: Build JS
        run: |
          bun run build
          bun run tsc

      - name: Init Windows
        shell: powershell
        run: |
          cd packages\example-windows
          Copy-Item metro.config.js metro.config.js.bak
          Copy-Item index.js index.js.bak
          npx react-native init-windows --overwrite --logging
          Copy-Item metro.config.js.bak metro.config.js -Force
          Copy-Item index.js.bak index.js -Force

      - name: Debug generated project
        shell: powershell
        run: |
          cd packages\example-windows
          $sln = Get-ChildItem -Path windows -Filter "*.sln" -Recurse | Select-Object -First 1
          $proj = Get-ChildItem -Path windows -Filter "*.vcxproj" -Recurse | Select-Object -First 1
          Write-Host "::notice::SLN=$($sln.FullName)"
          Write-Host "::notice::PROJ=$($proj.FullName)"
          Write-Host "::notice::WIN_FILES=$(Get-ChildItem -Path windows -Recurse | Measure-Object | Select-Object -ExpandProperty Count)"
          Write-Host "::notice::INDEX_JS=$(Get-Content index.js -TotalCount 3 | Out-String)"
          Write-Host "::notice::METRO_HAS_SHARED=$(Select-String -Path metro.config.js -Pattern 'example-shared' -Quiet)"

      - name: Build x64 release
        shell: powershell
        run: |
          cd packages\example-windows
          npx react-native run-windows --arch x64 --release --no-packager --no-deploy --logging --msbuildprops "BundleHermes=false" 2>&1 | Tee-Object -FilePath build_output.txt
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            $errs = Get-Content build_output.txt | Select-String -Pattern "error |ENOENT|source.?map|compose|MSB[0-9]|hermes|Could not|fatal" | Select-Object -Last 10
            foreach ($e in $errs) { Write-Host "::error::BUILD: $e" }
            exit $exitCode
          }
