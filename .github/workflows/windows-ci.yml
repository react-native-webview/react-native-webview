name: Windows CI
on: [pull_request]

jobs:
  run-windows-tests:
    name: Build & run tests
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6
        name: Checkout Code

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1.3
        with:
          vs-version: '[17.0,)'
          msbuild-architecture: x64

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Install Windows example dependencies
        env:
          # Tests use WinAppDriver, not chromedriver. The chromedriver
          # postinstall hits a deprecated Google XML endpoint and fails.
          APPIUM_SKIP_CHROMEDRIVER_INSTALL: 'true'
        run: bun install --frozen-lockfile
        working-directory: packages/example-windows

      - name: Build JS
        run: |
          bun run build
          bun run tsc

      - name: Generate Windows test app project
        working-directory: packages/example-windows
        run: bunx install-windows-test-app --use-fabric --project-directory windows

      - name: Verify generated project
        shell: powershell
        working-directory: packages/example-windows
        run: |
          Write-Host "=== windows/ ==="
          Get-ChildItem -Path windows -Recurse -Name | Select-Object -First 40
          Write-Host "=== node_modules/.generated/windows/ ==="
          Get-ChildItem -Path node_modules\.generated\windows -Recurse -Name -ErrorAction SilentlyContinue | Select-Object -First 40
          Write-Host "=== AutolinkedNativeModules.g.cpp ==="
          $genCpp = Get-ChildItem -Path node_modules\.generated\windows -Filter "AutolinkedNativeModules.g.cpp" -Recurse | Select-Object -First 1
          if ($genCpp) {
            $content = Get-Content $genCpp.FullName -Raw
            Write-Host $content
            if ($content -match '\{\{') {
              Write-Host "::error::AutolinkedNativeModules.g.cpp still has template placeholders - autolink did not run!"
            }
          } else { Write-Host "::warning::AutolinkedNativeModules.g.cpp NOT FOUND in generated dir" }
          Write-Host "=== Solution projects ==="
          if (Test-Path windows\WebviewExample.sln) {
            Select-String -Path windows\WebviewExample.sln -Pattern "Project\(" | ForEach-Object { Write-Host $_.Line }
          } else { Write-Host "::error::WebviewExample.sln not found!" }
          Write-Host "=== ExperimentalFeatures.props ==="
          if (Test-Path windows\ExperimentalFeatures.props) { Get-Content windows\ExperimentalFeatures.props } else { Write-Host "NOT FOUND" }

      - name: Build x64 release
        shell: powershell
        working-directory: packages/example-windows
        run: |
          msbuild windows\WebviewExample.sln /p:Configuration=Release /p:Platform=x64 /p:AppxBundle=Never /restore /bl:build.binlog 2>&1 | Tee-Object -FilePath build.log
          $code = $LASTEXITCODE
          if ($code -ne 0) {
            Write-Host "::group::Build errors"
            Get-Content build.log | Select-String ": error |: fatal error|LNK[0-9]" | Select-Object -Last 60 | ForEach-Object { Write-Host "::error::$_" }
            Write-Host "::endgroup::"
            exit $code
          }

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-logs
          path: |
            packages/example-windows/build.log
            packages/example-windows/build.binlog

      - name: Deploy
        shell: powershell
        working-directory: packages/example-windows
        run: |
          Copy-Item -Path windows\x64\Release -Recurse -Destination windows\
          bunx react-native run-windows --arch x64 --release --logging --no-build --no-packager --deploy-from-layout

      - name: Start Appium server
        shell: powershell
        working-directory: packages/example-windows
        run: Start-Process PowerShell -ArgumentList "bun run --bun appium"

      - name: Start React server
        shell: powershell
        working-directory: packages/example-windows
        run: Start-Process PowerShell -ArgumentList "bun run start"

      - name: Run tests
        working-directory: packages/example-windows
        run: bun run test
