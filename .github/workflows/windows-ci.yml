name: Windows CI
on: [pull_request]

jobs:
  run-windows-tests:
    name: Build & run tests
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6
        name: Checkout Code

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1.3
        with:
          vs-version: '[17.0,)'
          msbuild-architecture: x64

      - name: Install workspace dependencies
        run: bun install

      - name: Install Windows example dependencies
        run: bun install
        working-directory: packages/example-windows

      - name: Build JS
        run: |
          bun run build
          bun run tsc

      - name: Build x64 release
        shell: bash
        run: |
          set +e
          cd packages/example-windows
          OUTPUT=$(npx react-native run-windows --arch x64 --release --no-packager --no-deploy --logging --sln windows/ReactNativeWebviewExample.sln --proj windows/ReactNativeWebviewExample/ReactNativeWebviewExample.vcxproj 2>&1)
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            ERRORS=$(echo "$OUTPUT" | grep -i ": error \|: fatal error \|NETSDK\|MSB[0-9]" | tail -10 | tr '\n' '|')
            NUGET=$(echo "$OUTPUT" | grep -i "nuget\|restore\|packages.config\|Could not" | tail -5 | tr '\n' '|')
            echo "::error::BUILD_ERRORS: $ERRORS"
            echo "::error::NUGET_ISSUES: $NUGET"
            exit $EXIT_CODE
          fi

      - name: Deploy
        shell: powershell
        run: |
          Copy-Item -Path packages\example-windows\windows\x64\Release -Recurse -Destination packages\example-windows\windows\
          cd packages\example-windows
          npx react-native run-windows --arch x64 --release --logging --no-build --no-packager --deploy-from-layout

      - name: Start Appium server
        shell: powershell
        run: Start-Process PowerShell -ArgumentList "bun run --bun appium"

      - name: Start React server
        shell: powershell
        run: |
          cd packages/example-windows
          Start-Process PowerShell -ArgumentList "bun run start"

      - name: Run tests
        run: bun run test:windows
