name: Windows CI
on: [pull_request]

jobs:
  run-windows-tests:
    name: Build & run tests
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6
        name: Checkout Code

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1.3
        with:
          vs-version: '[17.0,)'
          msbuild-architecture: x64

      - name: Install Windows example dependencies
        env:
          # Tests use WinAppDriver, not chromedriver. The chromedriver
          # postinstall hits a deprecated Google XML endpoint and fails.
          APPIUM_SKIP_CHROMEDRIVER_INSTALL: 'true'
        run: bun install --frozen-lockfile
        working-directory: packages/example-windows

      - name: Generate Windows test app project
        working-directory: packages/example-windows
        run: bunx install-windows-test-app --use-fabric --use-nuget --project-directory windows

      - name: Patch generated Windows test app project
        shell: powershell
        working-directory: packages/example-windows
        run: |
          $generatedProject = "node_modules\.generated\windows\Win32\ReactApp.vcxproj"
          $generatedDir = "node_modules\.generated"
          $cppWinRTIncludes = Join-Path $generatedDir "CppWinRTIncludes.h"
          $versionMacros = Join-Path $generatedDir "VersionMacros.h"
          $winrtDir = Join-Path $generatedDir "winrt"
          $microsoftUIInterop = Join-Path $winrtDir "Microsoft.UI.interop.h"
          $content = Get-Content $generatedProject -Raw
          New-Item -ItemType Directory -Force -Path $winrtDir | Out-Null

          @"
          #pragma once

          #include <winrt/Windows.Foundation.Collections.h>
          #include <winrt/Windows.Foundation.h>
          "@ | Set-Content -Path $cppWinRTIncludes -NoNewline

          @"
          #pragma once

          #ifdef RNW_CANARY
          #define RNW_VERSION_AT_LEAST(major, minor, patch) true
          #define RNW_VERSION_LESS_THAN(major, minor, patch) false
          #else

          #define RNW_VERSION_AT_LEAST(major, minor, patch)                      \
            ((RNW_MAJOR > major) || (RNW_MAJOR == major && RNW_MINOR > minor) || \
             (RNW_MAJOR == major && RNW_MINOR == minor && RNW_PATCH >= patch))

          #define RNW_VERSION_LESS_THAN(major, minor, patch)                     \
            ((RNW_MAJOR < major) || (RNW_MAJOR == major && RNW_MINOR < minor) || \
             (RNW_MAJOR == major && RNW_MINOR == minor && RNW_PATCH < patch))

          #endif
          "@ | Set-Content -Path $versionMacros -NoNewline

          @"
          #pragma once
          "@ | Set-Content -Path $microsoftUIInterop -NoNewline

          if ($content -notlike "*ReactNativeWebView\windows\ReactNativeWebView*") {
            $content = $content.Replace(
              '$(ReactAppGeneratedDir);',
              '$(ReactAppGeneratedDir);' + "`r`n        " + '$(ProjectRootDir)\node_modules\react-native-webview\windows\ReactNativeWebView\$(Platform)\$(Configuration)\Generated Files;'
            )
            Set-Content -Path $generatedProject -Value $content -NoNewline
            Write-Host "Added ReactNativeWebView generated include directory to generated project"
          } else {
            Write-Host "Generated project already includes ReactNativeWebView generated headers"
          }

          if ($content -notlike "*ReactNativeWebView.vcxproj*") {
            $webViewProjectReference = @'
          <ItemGroup>
            <ProjectReference Include="$(ProjectRootDir)\node_modules\react-native-webview\windows\ReactNativeWebView\ReactNativeWebView.vcxproj">
              <Project>{30CADFC7-80EF-4296-A405-47E4B97C0C71}</Project>
              <LinkLibraryDependencies>true</LinkLibraryDependencies>
            </ProjectReference>
          </ItemGroup>
          '@
            $content = $content.Replace(
              '  <Import Project="$(VCTargetsPath)\Microsoft.Cpp.targets" />',
              $webViewProjectReference + "`r`n" + '  <Import Project="$(VCTargetsPath)\Microsoft.Cpp.targets" />'
            )
            Set-Content -Path $generatedProject -Value $content -NoNewline
            Write-Host "Added ReactNativeWebView project reference to generated project"
          } else {
            Write-Host "Generated project already includes ReactNativeWebView project reference"
          }

          Write-Host "Added generated Win32 compatibility headers to $generatedDir"

      - name: Inspect generated Windows project
        shell: powershell
        working-directory: packages/example-windows
        run: |
          $nugetRoot = Join-Path $env:USERPROFILE ".nuget\packages"
          $hermesVersion = "0.0.0-2512.22001-bc3d0ed7"
          $hermesPackage = Join-Path $nugetRoot "microsoft.javascript.hermes\$hermesVersion"
          $generatedProject = "node_modules\.generated\windows\Win32\ReactApp.vcxproj"
          $generatedProps = @(
            "windows\ExperimentalFeatures.props",
            "windows\Directory.Build.props",
            "node_modules\.generated\windows\Win32\ReactApp.Package.wapproj",
            $generatedProject
          )

          Write-Host "bun version: $(bun --version)"
          Write-Host "node version: $(node --version)"
          Write-Host "NuGet package root: $nugetRoot"
          Write-Host "Generated project exists: $(Test-Path $generatedProject)"
          Write-Host "Generated CppWinRTIncludes.h exists: $(Test-Path 'node_modules\.generated\CppWinRTIncludes.h')"
          Write-Host "Generated VersionMacros.h exists: $(Test-Path 'node_modules\.generated\VersionMacros.h')"
          Write-Host "Generated Microsoft.UI.interop.h exists: $(Test-Path 'node_modules\.generated\winrt\Microsoft.UI.interop.h')"
          Write-Host "Hermes package exists before MSBuild restore: $(Test-Path $hermesPackage)"

          foreach ($file in $generatedProps) {
            if (Test-Path $file) {
              Write-Host "::group::$file"
              Select-String -Path $file -Pattern "Hermes|NuGetPackageRoot|Bundle|CppWinRT|VersionMacros|Microsoft.ReactNative.Cxx|ReactNativeWebView|AdditionalIncludeDirectories|ProjectReference" | ForEach-Object {
                Write-Host "$($_.LineNumber): $($_.Line)"
              }
              Write-Host "::endgroup::"
            } else {
              Write-Host "Missing generated file: $file"
            }
          }

      - name: Restore NuGet packages
        shell: powershell
        working-directory: packages/example-windows
        run: |
          $nugetRoot = Join-Path $env:USERPROFILE ".nuget\packages"
          Write-Host "NuGet root: $nugetRoot"
          msbuild windows\ExampleWindows2.sln /t:Restore /p:Configuration=Release /p:Platform=x64 /p:UseExperimentalNuget=true /p:RnwNewArch=true /p:UseFabric=true /p:UseWinUI3=true /p:UseHermes=true /p:NuGetPackageRoot="$nugetRoot\" -v:normal 2>&1 | Tee-Object -FilePath restore.log
          $code = $LASTEXITCODE
          if ($code -ne 0) {
            Write-Host "::error::NuGet restore failed!"
            Get-Content restore.log | Select-String "error|warning|Microsoft.ReactNative|PackageReference" | Select-Object -Last 30 | ForEach-Object { Write-Host "::error::$_" }
            exit $code
          }
          Write-Host "=== Restored NuGet packages ==="
          Get-ChildItem "$nugetRoot" -ErrorAction SilentlyContinue | Where-Object { $_.Name -match "microsoft\.(reactnative|windowsappsdk|windows\.cppwinrt)" } | ForEach-Object { Write-Host "  $($_.Name)" }
          Write-Host "=== WindowsAppSDK packages ==="
          Get-ChildItem "$nugetRoot\microsoft.windowsappsdk*" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "  $($_.Name)"
            Get-ChildItem $_.FullName -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "    $($_.Name)" }
          }
          Write-Host "=== WinMD files in NuGet cache ==="
          Get-ChildItem "$nugetRoot" -Recurse -Filter "*.winmd" -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match "microsoft\.(reactnative|windowsappsdk|ui)" } | Select-Object -First 20 | ForEach-Object { Write-Host "  $($_.FullName)" }
          Write-Host "=== obj/ project.assets.json ==="
          $assets = Get-ChildItem -Path node_modules\.generated\windows -Filter "project.assets.json" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($assets) { Write-Host "  Exists at: $($assets.FullName) ($('{0:N0}' -f $assets.Length) bytes)" } else { Write-Host "  NOT FOUND!" }

      - name: Build x64 release
        shell: powershell
        working-directory: packages/example-windows
        run: |
          $nugetRoot = Join-Path $env:USERPROFILE ".nuget\packages"
          msbuild windows\ExampleWindows2.sln /p:Configuration=Release /p:Platform=x64 /p:AppxBundle=Never /p:UseExperimentalNuget=true /p:RnwNewArch=true /p:UseFabric=true /p:UseWinUI3=true /p:UseHermes=true /p:NuGetPackageRoot="$nugetRoot\" /bl:build.binlog 2>&1 | Tee-Object -FilePath build.log
          $code = $LASTEXITCODE
          if ($code -ne 0) {
            Write-Host "::group::Build errors"
            Get-Content build.log | Select-String ": error |: fatal error|LNK[0-9]" | Select-Object -Last 60 | ForEach-Object { Write-Host "::error::$_" }
            Write-Host "::endgroup::"
            exit $code
          }

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-logs
          path: |
            packages/example-windows/build.log
            packages/example-windows/build.binlog

      - name: Deploy
        shell: powershell
        working-directory: packages/example-windows
        run: |
          Copy-Item -Path windows\x64\Release -Recurse -Destination windows\
          bunx react-native run-windows --arch x64 --release --logging --no-build --no-packager --deploy-from-layout

          [xml]$manifest = Get-Content node_modules\.generated\windows\Win32\Package.appxmanifest
          $packageName = $manifest.Package.Identity.Name
          $app = Get-StartApps | Where-Object {
            $_.AppID -like "$packageName*!App"
          } | Select-Object -First 1

          if ($app) {
            "WINDOWS_APP_ID=$($app.AppID)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            Write-Host "Resolved Windows app id: $($app.AppID)"
          } else {
            Write-Host "Using fallback Windows app id from Jest setup"
          }

          "WINDOWS_ATTACH_TO_ROOT=true" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Start Appium server
        shell: powershell
        working-directory: packages/example-windows
        run: Start-Process PowerShell -ArgumentList "bun run --bun appium"

      - name: Run WebView smoke tests
        working-directory: packages/example-windows
        run: bun run test
