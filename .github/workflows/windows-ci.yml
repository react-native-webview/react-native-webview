name: Windows CI
on: [pull_request]

jobs:
  run-windows-tests:
    name: Build & run tests
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6
        name: Checkout Code

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1.3
        with:
          vs-version: '[17.0,)'
          msbuild-architecture: x64

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Install Windows example dependencies
        env:
          # Tests use WinAppDriver, not chromedriver. The chromedriver
          # postinstall hits a deprecated Google XML endpoint and fails.
          APPIUM_SKIP_CHROMEDRIVER_INSTALL: 'true'
        run: bun install --frozen-lockfile
        working-directory: packages/example-windows

      - name: Build JS
        run: |
          bun run build
          bun run tsc

      - name: Generate Windows test app project
        shell: powershell
        working-directory: packages/example-windows
        run: bunx install-windows-test-app --use-fabric --project-directory windows

      - name: Build x64 release
        shell: powershell
        working-directory: packages/example-windows
        run: |
          msbuild windows\WebviewExample.sln /p:Configuration=Release /p:Platform=x64 /p:Bundle=true /p:AppxBundle=Never /restore 2>&1 | Tee-Object -FilePath build.log
          $code = $LASTEXITCODE
          if ($code -ne 0) {
            Get-Content build.log | Select-String ": error |autolink|packages.config|Could not|MSB[0-9]" | Select-Object -Last 10 | ForEach-Object { Write-Host "::error::$_" }
            exit $code
          }

      - name: Deploy
        shell: powershell
        working-directory: packages/example-windows
        run: |
          Copy-Item -Path windows\x64\Release -Recurse -Destination windows\
          bunx react-native run-windows --arch x64 --release --logging --no-build --no-packager --deploy-from-layout

      - name: Start Appium server
        shell: powershell
        working-directory: packages/example-windows
        run: Start-Process PowerShell -ArgumentList "bun run --bun appium"

      - name: Start React server
        shell: powershell
        working-directory: packages/example-windows
        run: Start-Process PowerShell -ArgumentList "bun run start"

      - name: Run tests
        working-directory: packages/example-windows
        run: bun run test
