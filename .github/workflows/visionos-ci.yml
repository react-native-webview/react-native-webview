name: visionOS
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Install dependencies
        run: |
          bun install 2>&1 || (echo "::error::BUN_INSTALL_FAILED" && exit 1)
          echo "::notice::NM_COUNT=$(ls node_modules/ 2>/dev/null | wc -l)"
          echo "::notice::RNTA=$(ls node_modules/react-native-test-app/package.json 2>/dev/null && echo EXISTS || echo MISSING)"
        working-directory: packages/example-visionos
      - name: Debug RNTA
        run: |
          echo "::notice::RNTA_VISIONOS=$(ls ../node_modules/react-native-test-app/visionos/test_app.rb 2>/dev/null && echo EXISTS || echo MISSING)"
          echo "::notice::RNTA_VER=$(node -e "console.log(require('../node_modules/react-native-test-app/package.json').version)")"
          echo "::notice::POD_VER=$(pod --version)"
        working-directory: packages/example-visionos/visionos
      - name: Install Pods
        run: |
          pod install 2>&1 | tee pod_output.txt
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            ERRS=$(grep -i "error\|Error\|fatal\|abort\|LoadError\|cannot\|undefined\|No such\|not found" pod_output.txt | tail -5)
            echo "::error::POD_FAIL: $ERRS"
            exit $EXIT
          fi
        working-directory: packages/example-visionos/visionos
      - name: Build visionOS test app
        run: |
          xcodebuild -workspace WebviewExample.xcworkspace -scheme ReactTestApp -destination 'generic/platform=visionOS Simulator' CODE_SIGNING_ALLOWED=NO COMPILER_INDEX_STORE_ENABLE=NO build
        working-directory: packages/example-visionos/visionos
    timeout-minutes: 60
