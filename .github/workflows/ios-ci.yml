name: iOS
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Install dependencies
        run: bun install
      - name: Debug pod resolution
        run: |
          set +e
          RNTA=$(node --print "require('path').dirname(require.resolve('react-native-test-app/package.json'))" 2>&1)
          RN=$(node --print "require('path').dirname(require.resolve('react-native/package.json'))" 2>&1)
          echo "::notice::POD_DEBUG: RNTA=$RNTA RN=$RN node=$(which node) cwd=$(pwd)"
          ls packages/example-mobile/ios/ || echo "ios dir not found"
          cat packages/example-mobile/ios/Podfile
      - name: Install Pods
        run: pod install
        working-directory: packages/example-mobile/ios
      - name: Build iOS test app
        run: |
          device_name='iPhone 17'
          device=$(xcrun simctl list devices "${device_name}" available | grep "${device_name} (")
          re='\(([-0-9A-Fa-f]+)\)'
          [[ $device =~ $re ]] || exit 1
          xcodebuild -workspace WebviewExample.xcworkspace -scheme ReactTestApp -destination "platform=iOS Simulator,id=${BASH_REMATCH[1]}" CODE_SIGNING_ALLOWED=NO COMPILER_INDEX_STORE_ENABLE=NO build
        working-directory: packages/example-mobile/ios
    timeout-minutes: 60
