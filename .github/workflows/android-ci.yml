name: Android
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install dependencies
        run: bun install
        shell: bash
      - name: Link workspace node_modules
        run: rm -rf packages/example-mobile/node_modules && ln -s ../../node_modules packages/example-mobile/node_modules
        shell: bash
      - name: Build Android test app
        run: |
          set +e
          OUTPUT=$(./gradlew --no-daemon --stacktrace clean build check test 2>&1)
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            LINE1=$(echo "$OUTPUT" | grep -A1 "What went wrong" | tail -1 | tr -d '\n')
            LINE2=$(echo "$OUTPUT" | grep -A2 "What went wrong" | tail -1 | tr -d '\n')
            LINE3=$(echo "$OUTPUT" | grep "Exception\|Error\|Could not\|Cannot\|not found\|No such" | head -3 | tr '\n' ' ')
            echo "::error::WHAT1: $LINE1"
            echo "::error::WHAT2: $LINE2"
            echo "::error::ERRORS: $LINE3"
            exit $EXIT_CODE
          fi
        shell: bash
        working-directory: packages/example-mobile/android
    timeout-minutes: 60
