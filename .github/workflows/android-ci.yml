name: Android
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install dependencies
        run: bun install
        shell: bash
      - name: Debug node_modules
        run: |
          {
            echo "## Debug: node_modules layout"
            echo '```'
            echo "bunfig.toml: $(cat bunfig.toml)"
            echo "Root node_modules:"
            ls node_modules/ 2>/dev/null | head -30 || echo "EMPTY"
            echo ""
            echo "example-mobile node_modules:"
            ls packages/example-mobile/node_modules/ 2>/dev/null | head -20 || echo "EMPTY"
            echo ""
            echo "react-native at root: $(node -e "try{console.log(require('./node_modules/react-native/package.json').version)}catch(e){console.log('NOT FOUND')}" 2>&1)"
            echo "react-native in example-mobile: $(node -e "try{console.log(require('./packages/example-mobile/node_modules/react-native/package.json').version)}catch(e){console.log('NOT FOUND')}" 2>&1)"
            echo "react-native-test-app: $(node -e "try{console.log(require('./node_modules/react-native-test-app/package.json').version)}catch(e){console.log('NOT FOUND')}" 2>&1)"
            echo "RNTA in example-mobile: $(node -e "try{console.log(require('./packages/example-mobile/node_modules/react-native-test-app/package.json').version)}catch(e){console.log('NOT FOUND')}" 2>&1)"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
        shell: bash
      - name: Build Android test app
        run: ./gradlew --no-daemon --stacktrace clean build check test
        shell: bash
        working-directory: packages/example-mobile/android
    timeout-minutes: 60
