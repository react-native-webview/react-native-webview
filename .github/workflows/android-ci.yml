name: Android
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install dependencies
        run: |
          bun install
          echo "::notice::MOBILE_PKGS=$(ls packages/example-mobile/node_modules/ 2>/dev/null | wc -l) ROOT_PKGS=$(ls node_modules/ 2>/dev/null | wc -l) BUNFIG=$(cat bunfig.toml 2>/dev/null) BUN=$(bun --version)"
          if [ ! -d "packages/example-mobile/node_modules/react-native" ]; then
            echo "::notice::CREATING_SYMLINK: mobile node_modules empty, symlinking to root"
            rm -rf packages/example-mobile/node_modules && ln -s ../../node_modules packages/example-mobile/node_modules
          fi
        shell: bash
      - name: Build Android test app
        run: |
          set +e
          OUTPUT=$(./gradlew --no-daemon --stacktrace clean build check test 2>&1)
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            LINE1=$(echo "$OUTPUT" | grep -A1 "What went wrong" | tail -1 | tr -d '\n')
            LINE2=$(echo "$OUTPUT" | grep -A2 "What went wrong" | tail -1 | tr -d '\n')
            LINE3=$(echo "$OUTPUT" | grep "Could not find\|Could not resolve\|Could not get\|artifact" | head -5 | tr '\n' ' ')
            RN_PATH=$(echo "$OUTPUT" | grep "reactNativePath\|react-native/android\|maven" | head -3 | tr '\n' ' ')
            echo "::error::WHAT1: $LINE1"
            echo "::error::WHAT2: $LINE2"
            echo "::error::MISSING: $LINE3"
            echo "::error::PATHS: $RN_PATH"
            exit $EXIT_CODE
          fi
        shell: bash
        working-directory: packages/example-mobile/android
    timeout-minutes: 60
