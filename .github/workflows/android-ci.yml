name: Android
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install dependencies
        run: bun install
        shell: bash
      - name: Link workspace node_modules
        run: ln -sf ../../node_modules packages/example-mobile/node_modules
        shell: bash
      - name: Build Android test app
        run: ./gradlew --no-daemon --stacktrace clean build check test
        shell: bash
        working-directory: packages/example-mobile/android
    timeout-minutes: 60
