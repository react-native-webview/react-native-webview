name: Android
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        newArchEnabled: [false, true]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install dependencies
        run: bun install
        shell: bash
      - name: Debug node_modules
        run: |
          echo "=== Root node_modules ==="
          ls node_modules/ | head -20
          echo "=== Example node_modules ==="
          ls packages/example/node_modules/ | head -20
          echo "=== react-native path ==="
          realpath packages/example/node_modules/react-native || true
          echo "=== Gradle wrapper ==="
          cat packages/example/android/gradle/wrapper/gradle-wrapper.properties
        shell: bash
      - name: Build Android test app
        run: ./gradlew -PnewArchEnabled=${{matrix.newArchEnabled}} --no-daemon --stacktrace clean build check test 2>&1 || true
        shell: bash
        working-directory: packages/example/android
    timeout-minutes: 60
