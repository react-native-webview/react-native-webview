name: macOS
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Install dependencies
        run: bun install
      - name: Debug node_modules
        run: |
          echo "=== Root node_modules ==="
          ls node_modules/ | head -30 || echo "EMPTY"
          echo "=== example-macos node_modules ==="
          ls packages/example-macos/node_modules/ 2>/dev/null | head -20 || echo "EMPTY"
          echo "=== react-native-test-app location ==="
          find . -path "*/node_modules/react-native-test-app/package.json" -not -path "*/.bun/*" 2>/dev/null | head -5
          echo "=== react-native location ==="
          find . -path "*/node_modules/react-native/package.json" -not -path "*/.bun/*" 2>/dev/null | head -5
          echo "=== Podfile ==="
          cat packages/example-macos/macos/Podfile
      - name: Install Pods
        run: pod install 2>&1 || true
        working-directory: packages/example-macos/macos
      - name: Build macOS test app
        if: success()
        run: |
          xcodebuild -workspace WebviewExample.xcworkspace -scheme ReactTestApp CODE_SIGNING_ALLOWED=NO COMPILER_INDEX_STORE_ENABLE=NO build
        working-directory: packages/example-macos/macos
    timeout-minutes: 60
