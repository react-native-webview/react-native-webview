name: macOS
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Install dependencies
        run: bun install --linker hoisted
        working-directory: packages/example-macos
      - name: Debug before pods
        working-directory: packages/example-macos
        run: |
          echo "::notice::NODE=$(which node) BUN=$(which bun)"
          echo "::notice::RNTA=$(node -e "try{console.log(require.resolve('react-native-test-app/package.json'))}catch(e){console.log('NOT_FOUND: '+e.message)}")"
          echo "::notice::NM_COUNT=$(ls node_modules/ 2>/dev/null | wc -l)"
          echo "::notice::RNTA_DIR=$(ls -d node_modules/react-native-test-app 2>/dev/null || echo MISSING)"
      - name: Install Pods
        run: pod install
        working-directory: packages/example-macos/macos
      - name: Build macOS test app
        run: |
          xcodebuild -workspace WebviewExample.xcworkspace -scheme ReactTestApp CODE_SIGNING_ALLOWED=NO COMPILER_INDEX_STORE_ENABLE=NO build
        working-directory: packages/example-macos/macos
    timeout-minutes: 60
