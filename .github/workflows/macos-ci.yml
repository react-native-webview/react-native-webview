name: macOS
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Install dependencies
        run: bun install --linker hoisted
      - name: Debug node_modules
        run: |
          echo "=== react-native-test-app ==="
          ls packages/example-macos/node_modules/react-native-test-app/macos/ 2>/dev/null || ls node_modules/react-native-test-app/macos/ 2>/dev/null || echo "NOT FOUND"
          echo "=== react-native ==="
          node -e "console.log(require('packages/example-macos/node_modules/react-native/package.json').version)" 2>/dev/null || node -e "console.log(require('./node_modules/react-native/package.json').version)" 2>/dev/null || echo "NOT FOUND"
          echo "=== react-native-macos ==="
          node -e "console.log(require('packages/example-macos/node_modules/react-native-macos/package.json').version)" 2>/dev/null || node -e "console.log(require('./node_modules/react-native-macos/package.json').version)" 2>/dev/null || echo "NOT FOUND"
      - name: Install Pods
        run: pod install
        working-directory: packages/example-macos/macos
      - name: Build macOS test app
        run: |
          xcodebuild -workspace WebviewExample.xcworkspace -scheme ReactTestApp CODE_SIGNING_ALLOWED=NO COMPILER_INDEX_STORE_ENABLE=NO build
        working-directory: packages/example-macos/macos
    timeout-minutes: 60
