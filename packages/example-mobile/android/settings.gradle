pluginManagement {
    repositories {
        gradlePluginPortal()
        mavenLocal()
        google()
    }
}

rootProject.name = "WebviewExample"

def generators = new File(
    new String(new groovy.json.JsonSlurper()
        .parseText(["node", "--print", "JSON.stringify(require.resolve('react-native-test-app/package.json'))"].execute(null, rootDir.parentFile).text)
    ).replace("package.json", ""),
    "test-app.gradle"
)
apply(from: generators)
applyTestAppSettings(settings)
