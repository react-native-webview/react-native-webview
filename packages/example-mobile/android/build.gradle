buildscript {
    def generators = new File(["node", "--print", "require.resolve('react-native-test-app/package.json')"].execute(null, rootDir.parentFile).text.trim()).getParentFile().toString()
    def androidTestAppDir = "${generators}/android"
    apply(from: "${androidTestAppDir}/dependencies.gradle")

    repositories {
        mavenCentral()
        google()
    }

    dependencies {
        getReactNativeDependencies().each { dependency ->
            classpath(dependency)
        }
    }
}
