buildscript {
    def generators = new String(new groovy.json.JsonSlurper()
        .parseText(["node", "--print", "JSON.stringify(require.resolve('react-native-test-app/package.json'))"].execute(null, rootDir.parentFile).text)
    ).replace("package.json", "")
    def androidTestAppDir = "${generators}android"
    apply(from: "${androidTestAppDir}/dependencies.gradle")

    repositories {
        mavenCentral()
        google()
    }

    dependencies {
        getReactNativeDependencies().each { dependency ->
            classpath(dependency)
        }
    }
}
